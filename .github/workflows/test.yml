name: language_tool_python CI

permissions:
  contents: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  tests:
    timeout-minutes: 20
    name: Test on ${{ matrix.os }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write # Required for Codecov OIDC authentication
    strategy:
      fail-fast: false
      matrix:
        # Execute tests on python 3.10-3.15 on ubuntu
        # and python 3.14 on macOS and windows
        include:
          - os: ubuntu-26.04
            python-version: "3.10"
          - os: ubuntu-26.04
            python-version: "3.11"
          - os: ubuntu-26.04
            python-version: "3.12"
          - os: ubuntu-26.04
            python-version: "3.13"
          - os: ubuntu-26.04
            python-version: "3.14"
          - os: ubuntu-26.04
            python-version: "3.15.0-beta.3"
          - os: macos-26
            python-version: "3.14"
          - os: windows-2025
            python-version: "3.14"

    steps:
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0
    
    - name: Set up JDK 26
      uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # 5.3.0
      with:
        distribution: 'temurin'
        java-version: '26'

    - name: Clone repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
      with:
        persist-credentials: true # Required for Codecov OIDC authentication

    - name: Test with pytest
      run: |
        uv run --python ${{ matrix.python-version }} --group tests --locked pytest

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-26.04' && matrix.python-version == '3.14'
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        use_oidc: true
        files: ./coverage.xml
        fail_ci_if_error: false

  lint:
    timeout-minutes: 10
    name: Lint with Ruff
    runs-on: ubuntu-26.04
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0

      - name: Clone repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          persist-credentials: false

      - name: Run Ruff Linter
        run: |
          make ruff-check
  
  type_check:
    timeout-minutes: 10
    name: Type Check with Mypy
    runs-on: ubuntu-26.04
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # 8.2.0

      - name: Clone repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          persist-credentials: false

      - name: Run Mypy Type Checker
        run: | 
          make mypy-check
